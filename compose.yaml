# a local compose.yaml file for testing
#
# Services:
#   - redis         → cache + celery broker/backend
#   - traefik       → reverse proxy (HTTP :80), Cloudflare IP restoration
#   - web           → Django/Gunicorn (3 replicas)
#   - celery_worker → background task runner
#   - celery_beat   → background task scheduler
#
# Postgres is excluded — deploy/access on same vps or cloud region separately via the DATABASE_URL env var.
# logs_data volume removed — all logging goes to stdout/stderr via Docker
#   json-file driver. Use `docker logs <container>` or a log collector.
# Django management commands can be accessed by
#  docker compose exec web sh
#  that opens a terminal that one can type command in e.g. python manage.py createsuperuser
# To restart any service use : docker compose <service> e.g. docker compose restart web

services:

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2m
      timeout: 3s
      retries: 2
      start_period: 10s

  traefik:
    image: traefik:v3.6.12
    restart: unless-stopped
    ports:
      - "80:80"
    command:
      - "--providers.docker=true"
      # Only discover containers on with explicit labels —
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--entrypoints.web.address=:80"
      # Restore real client IP from Cloudflare
      - "--entrypoints.web.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32"
      - "--ping=true"
      - "--accesslog=true"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 5m
      timeout: 5s
      retries: 2
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    depends_on:
      web:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
        UID: ${UID:-10001}
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    command: [ "./build.sh" ]
    restart: unless-stopped
    volumes:
      - static:/app/static
    healthcheck:
      test: [ "CMD", "python3", "./docker-health-check.py" ]
      interval: 15m
      timeout: 10s
      retries: 2
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=django,environment=production"
    labels:
      - "traefik.enable=true"

      # 1. Main routing
      - "traefik.http.routers.django.rule=Host(`cberesources.localhost`)" #in prod domain is cberesources.co.ke
      - "traefik.http.routers.django.entrypoints=web"
      - "traefik.http.services.django.loadbalancer.server.port=8000"

      # 2. Security headers
      - "traefik.http.middlewares.sec-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.sec-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.sec-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.sec-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.sec-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.sec-headers.headers.stsIncludeSubdomains=true"

      # 3. Rate limiting (~30 req/min, burst of 20)
      - "traefik.http.middlewares.rate-limit.ratelimit.average=30"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=20"
      - "traefik.http.middlewares.rate-limit.ratelimit.period=1m"

      # 4. Redirect /health → /health/
      - "traefik.http.middlewares.health-redir.redirectregex.regex=^http://([^/]+)/health$$"
      - "traefik.http.middlewares.health-redir.redirectregex.replacement=http://$${1}/health/"

      # 5. Apply middlewares
      - "traefik.http.routers.django.middlewares=sec-headers,rate-limit,health-redir"
    deploy:
      replicas: 3
      mode: replicated

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        UID: ${UID:-10001}
    restart: unless-stopped
    command: >
      celery -A cbe_res_hub worker
      --loglevel=info
      --concurrency=2
      --prefetch-multiplier=1
      --max-tasks-per-child=100
      --max-memory-per-child=200000
    env_file:
      - .env.docker
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [ "CMD-SHELL", "celery -A cbe_res_hub inspect ping -d celery@$${HOSTNAME} || exit 1" ]
      interval: 5m
      timeout: 10s
      retries: 2
      start_period: 15s

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
        UID: ${UID:-10001}
    restart: unless-stopped
    command: celery -A cbe_res_hub beat -l info
    env_file:
      - .env.docker
    depends_on:
      web:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_healthy

volumes:
  redis_data:
  static:
