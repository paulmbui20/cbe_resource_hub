<article
        class="group relative flex flex-col rounded-2xl bg-white/5 border border-white/10 hover:border-brand-gold/40 hover:bg-white/7 transition-all duration-300 overflow-hidden shadow-md hover:shadow-brand-gold/10 hover:shadow-lg">
    <div class="p-5 flex flex-col flex-1 gap-3">
        <div class="flex flex-wrap gap-1.5">
        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-brand-primary/20 text-brand-accent">
          {{ resource.learning_area.name }}
        </span>
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-white/10 text-white/70">
          {{ resource.grade.name }}
        </span>
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-white/10 text-white/70">
          {{ resource.resource_type }}
        </span>
        </div>
        <h3 class="text-sm font-semibold text-white leading-snug line-clamp-2 group-hover:text-brand-gold transition-colors">
            <a href="{{ resource.get_absolute_url }}"
               class="stretched-link after:absolute after:inset-0">{{ resource.title }}</a>
        </h3>
        <div class="pt-2 border-t border-white/5 flex items-center justify-between text-xs text-white/30 mt-auto">
            {% if resource.is_free %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-500/20 text-green-400">
              Free
            </span>
            {% else %}
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-brand-gold/20 text-brand-gold">
              KES {{ resource.price }}
            </span>
            {% endif %}
            <span class="flex items-center gap-1"><svg class="w-3 h-3" fill="none"
                                                       stroke="currentColor"
                                                       viewBox="0 0 24 24"><path
                    stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                {{ resource.downloads }}</span>
        </div>
    </div>
</article>
