{% extends "base.html" %}
{% load static %}

{% block title %}Browse CBC Resources{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <!-- Page heading -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-white tracking-tight">
      CBC Learning Resources
    </h1>
    <p class="mt-2 text-white/60 text-sm">
      Free curriculum-aligned materials for every grade and learning area.
    </p>
  </div>

  <!-- ─── Filter bar ──────────────────────────────────────────────── -->
  <form method="get" action=""
        hx-get=""
        hx-push-url="true"
        hx-target="#resource-grid"
        hx-swap="innerHTML"
        class="mb-8 flex flex-wrap gap-3 items-end">

    <!-- Search -->
    <div class="flex-1 min-w-[200px]">
      <label for="id_q" class="block text-xs text-white/50 mb-1">Search</label>
      <input id="id_q" type="search" name="q" value="{{ search_query }}"
             placeholder="e.g. Fractions worksheet…"
             class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-brand-primary transition" />
    </div>

    <!-- Education Level -->
    <div class="min-w-[150px]">
      <label for="id_level" class="block text-xs text-white/50 mb-1">Level</label>
      <select id="id_level" name="level"
              class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-primary transition">
        <option value="">All Levels</option>
        {% for level in education_levels %}
        <option value="{{ level.pk }}" {% if current_level == level.pk|stringformat:"s" %}selected{% endif %}>
          {{ level.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <!-- Learning Area -->
    <div class="min-w-[150px]">
      <label for="id_area" class="block text-xs text-white/50 mb-1">Subject</label>
      <select id="id_area" name="area"
              class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-primary transition">
        <option value="">All Subjects</option>
        {% for area in learning_areas %}
        <option value="{{ area.pk }}" {% if current_area == area.pk|stringformat:"s" %}selected{% endif %}>
          {{ area.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <button type="submit"
            class="px-5 py-2 rounded-lg bg-brand-primary hover:bg-brand-accent text-white text-sm font-semibold transition-colors shadow-lg shadow-brand-primary/20">
      Filter
    </button>
  </form>

  <!-- ─── Resource grid (HTMX target) ────────────────────────────── -->
  <div id="resource-grid">
    {% include "resources/partials/resource_cards.html" %}
  </div>

</div>
{% endblock %}
