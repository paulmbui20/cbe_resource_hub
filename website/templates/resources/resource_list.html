{% extends "base.html" %}
{% load static %}

{% block title %}Browse CBC Resources{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

        <!-- Page heading -->
        <div class="mb-4">
            <h1 class="text-3xl font-bold text-white tracking-tight">
                CBC Learning Resources
            </h1>
            <p class="mt-2 text-white/60 text-sm">
                Free curriculum-aligned materials every grade across all the learning areas.
            </p>
        </div>

        <!-- ─── Filter bar ──────────────────────────────────────────────── -->
        <form method="get" action="{% url 'resources:list' %}"
              hx-get="{% url 'resources:list' %}"
              hx-push-url="true"
              hx-target="#resource-grid"
              hx-swap="innerHTML"
          class="mb-4 grid grid-cols-2 md:grid-cols-6 gap-2 items-end justify-between">

            <!-- Search -->
            <div class="">
                <label for="id_q" class="block text-xs text-white/50 mb-1">Search</label>
                <input id="id_q" type="search" name="q" value="{{ search_query }}"
                       placeholder="e.g. Integrated Science Notes…"
                       class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-brand-gold transition"/>
            </div>

            <!-- Education Level -->
            <div class="">
                <label for="id_level" class="block text-xs text-white/50 mb-1">Level</label>
                <select id="id_level" name="level"
                        class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-gold transition">
                    <option value="">All Levels</option>
                    {% for level in education_levels %}
                        <option value="{{ level.pk }}"
                                {% if current_level == level.pk|stringformat:"s" %}selected{% endif %}>
                            {{ level.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Grade -->
            <div class="min-w-20">
                <label for="id_grade" class="block text-xs text-white/50 mb-1">Grade</label>
                <select id="id_grade" name="grade"
                        class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-gold transition">
                    <option value="">All Grades</option>
                    {% for grade in grades %}
                        <option value="{{ grade.pk }}"
                                {% if current_grade == grade.pk|stringformat:"s" %}selected{% endif %}>
                            {{ grade.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Learning Area -->
            <div class="min-w-26">
                <label for="id_area" class="block text-xs text-white/50 mb-1">Subject</label>
                <select id="id_area" name="area"
                        class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-gold transition">
                    <option value="">All Subjects</option>
                    {% for area in learning_areas %}
                        <option value="{{ area.pk }}"
                                {% if current_area == area.pk|stringformat:"s" %}selected{% endif %}>
                            {{ area.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Resource Type -->
            <div class="">
                <label for="id_resource_type" class="block text-xs text-white/50 mb-1">Resource Type</label>
                <select id="id_resource_type" name="resource_type"
                        class="w-full rounded-lg bg-white/5 border border-white/10 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-gold transition">
                    <option value="">All Types</option>
                    {% for resource_type in resource_types %}
                        <option value="{{ resource_type }}"
                                {% if current_resource_type == resource_type|stringformat:"s" %}selected{% endif %}>
                            {{ resource_type }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex w-full gap-2 items-center">
                <button type="submit"
                        class="w-full px-4 py-2 rounded-lg bg-brand-gold/90 hover:bg-brand-gold text-white text-sm font-semibold transition-colors shadow-lg shadow-brand-gold/20 hover:cursor-pointer">
                    Filter
                </button>
                <button type="button"
                        hx-get="{% url 'resources:list' %}"
                        hx-push-url="true"
                        hx-target="#resource-grid"
                        hx-swap="innerHTML"
                        class="w-full px-4 py-2 rounded-lg bg-brand-primary hover:bg-brand-accent text-white text-sm font-semibold transition-colors shadow-lg shadow-brand-accent/20 hover:cursor-pointer">
                    Clear
                </button>
            </div>
        </form>

        <!-- ─── Resource grid (HTMX target) ────────────────────────────── -->
        <div id="resource-grid">
            {% include "resources/partials/resource_cards.html" %}
        </div>

    </div>
{% endblock %}
