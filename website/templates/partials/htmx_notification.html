<div
        class="flex gap-3 max-w-sm w-full pointer-events-none p-2 pointer-events-auto w-full
        rounded-xl shadow-2xl border overflow-hidden
        {% if success %}
        bg-green-950/40 border-green-500/30 shadow-green-950/40
        {% else %}
        bg-red-950/40 border-red-500/30 shadow-red-950/40
        {% endif %}" x-data="{ hideNotice: false }" x-show="!hideNotice">
    <div class="shrink-0 mt-0.5">
        {% if success %}
            <!-- Success -->
            <svg class="w-5 h-5 text-green-400" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        {% else %}
            <!-- Error -->
            <svg class="w-5 h-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        {% endif %}
    </div>
    <p class="flex-1 text-sm font-medium leading-snug">
        {{ message }}
    </p>

    <!-- Close -->
    <button x-on:click="hideNotice = !hideNotice"
            class="shrink-0 -mt-0.5 -mr-1 p-1 rounded-lg transition-colors opacity-50 hover:opacity-100
                  {% if success %}
                  hover:bg-green-500/20 text-green-300
                  {% else %}
                  hover:bg-red-500/20 text-red-300
                  {% endif %}
                  hover:cursor-pointer
                ">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

</div>
