<div class="rounded-2xl bg-brand-secondary/5 border border-white/5 shadow-2xl overflow-hidden">

    <form class="p-8 space-y-5" id="emailSubscriptionForm"
          hx-swap="outerHTML"
          hx-post="{% url 'email_subscription' %}"
          x-data="{ submitting: false }" @submit="submitting = true">
        {% csrf_token %}
        {# Honeypot #}

        <!-- Form header -->
        <div class="border-b border-white/8 pb-4">
            <h2 class="text-xl font-bold text-white">Email Subscription Form</h2>
            <p class="text-sm text-white/50 mt-1">
                Drop your email address bellow to start receiving notifications on personalized new resources straight
                to
                your inbox.</p>
        </div>

        <!-- Email + Submit Button row -->
        <div class="grid sm:grid-cols-2 gap-4 items-end">
            <div>
                <label for="email"
                       class="block text-xs font-semibold text-white/50 mb-1.5 uppercase tracking-wider">
                    Email Address
                </label>
                <input type="email" name="email" id="email"
                       placeholder="your@email.com"
                       autocomplete="email" required
                       class="w-full rounded-xl bg-white/5 border border-white/10 px-4 py-3 text-sm text-white placeholder:text-white/25 focus:outline-none focus:ring-2 focus:ring-brand-primary focus:border-transparent transition-all hover:border-white/20">
                {% if form.email.errors %}
                    <p class="mt-1.5 text-xs text-red-400">{{ form.email.errors.0 }}</p>
                {% endif %}
            </div>

            <!-- Submit -->
            <div class="pt-2">
                <button type="submit"
                        :disabled="submitting"
                        class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl bg-brand-primary hover:bg-blue-600 disabled:opacity-60 disabled:cursor-not-allowed text-white text-sm font-bold transition-all shadow-lg shadow-brand-primary/30 hover:scale-105 hover:shadow-brand-primary/50">
                <span x-show="!submitting">
                  Submit
                </span>
                    <span x-show="submitting" class="flex items-center gap-2">
                  <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                  </svg>
                  Sending…
                </span>
                </button>
            </div>
        </div>
    </form>
</div>
