{% load i18n %}
<div x-data="{ show: false, deleteUrl: '', itemName: '' }" 
     @open-delete-modal.window="show = true; deleteUrl = $event.detail.url; itemName = $event.detail.name"
     x-cloak>

  <!-- Backdrop -->
  <div x-show="show"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       x-on:click="show = false"
       class="fixed inset-0 z-40 bg-black/70 backdrop-blur-sm"></div>

  <!-- Modal Panel - slides up from bottom on mobile, scales in from center on desktop -->
  <div x-show="show"
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-8 scale-95"
       x-transition:enter-end="opacity-100 translate-y-0 scale-100"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0 scale-100"
       x-transition:leave-end="opacity-0 translate-y-8 scale-95"
       class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4"
       role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">

    <div class="relative w-full sm:max-w-md bg-[#0d1117] border border-red-500/30 rounded-2xl shadow-2xl shadow-red-950/50 overflow-hidden">
      
      <!-- Red accent top bar -->
      <div class="absolute top-0 left-0 right-0 h-0.5 bg-linear-to-r from-transparent via-red-500 to-transparent"></div>
      
      <!-- Header -->
      <div class="px-6 pt-7 pb-5 flex items-start gap-4">
        <!-- Icon -->
        <div class="shrink-0 flex h-11 w-11 items-center justify-center rounded-xl bg-red-500/15 border border-red-500/20 mt-0.5">
          <svg class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path>
          </svg>
        </div>
        <!-- Text -->
        <div class="flex-1">
          <h3 class="text-lg font-bold text-white" id="delete-modal-title">Confirm Deletion</h3>
          <p class="mt-1.5 text-sm text-white/50">
            You are about to permanently delete 
            <span class="font-semibold text-white/90 italic" x-text="'&quot;' + itemName + '&quot;'"></span>.
            This action <span class="text-red-400 font-semibold">cannot be undone</span>.
          </p>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-t border-white/8 mx-6"></div>

      <!-- Actions -->
      <div class="px-6 py-5 flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
        <button x-on:click="show = false" type="button"
                class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-white/8 hover:bg-white/12 border border-white/10 text-white text-sm font-semibold transition-colors">
          Cancel
        </button>
        <form :action="deleteUrl" method="POST" class="w-full sm:w-auto">
          {% csrf_token %}
          <button type="submit"
                  class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-white text-sm font-bold transition-all shadow-lg shadow-red-900/40 hover:shadow-red-900/60 hover:scale-105">
            Yes, Delete Permanently
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
