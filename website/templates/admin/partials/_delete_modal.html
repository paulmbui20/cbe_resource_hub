<div x-data="{ show: false, deleteUrl: '', itemName: '' }" 
     @open-delete-modal.window="show = true; deleteUrl = $event.detail.url; itemName = $event.detail.name"
     x-cloak
     x-show="show" 
     class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  
  <div x-show="show" x-transition.opacity class="fixed inset-0 bg-black/80 backdrop-blur-sm transition-opacity"></div>

  <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <div x-show="show" 
           x-transition:enter="ease-out duration-300" 
           x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
           x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" 
           x-transition:leave="ease-in duration-200" 
           x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" 
           x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" 
           @click.away="show = false"
           class="relative transform overflow-hidden rounded-2xl bg-[#0f172a] border border-white/10 text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
        
        <div class="px-6 py-8">
          <div class="sm:flex sm:items-start">
            <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-red-500/20 sm:mx-0 sm:h-10 sm:w-10">
              <svg class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left">
              <h3 class="text-xl font-bold leading-6 text-white" id="modal-title">Confirm Deletion</h3>
              <div class="mt-2 text-sm text-gray-400">
                Are you absolutely sure you want to delete <span class="font-bold text-white italic" x-text="itemName"></span>? 
                This action cannot be undone. All data associated with this item will be permanently removed.
              </div>
            </div>
          </div>
        </div>
        
        <div class="bg-white/5 px-6 py-4 flex flex-col sm:flex-row-reverse sm:gap-3">
          <form :action="deleteUrl" method="POST" class="w-full sm:w-auto">
            {% csrf_token %}
            <button type="submit" class="inline-flex w-full justify-center rounded-xl bg-red-600 px-6 py-2 text-sm font-semibold text-white shadow-sm hover:bg-red-500 sm:ml-3 sm:w-auto transition-colors">Confirm & Delete</button>
          </form>
          <button @click="show = false" type="button" class="mt-3 inline-flex w-full justify-center rounded-xl bg-white/10 px-6 py-2 text-sm font-semibold text-white hover:bg-white/20 sm:mt-0 sm:w-auto transition-colors">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>
