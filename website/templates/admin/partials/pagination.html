{% if is_paginated %}
    <div class="mt-6 flex items-center justify-center gap-3">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% if q %}&q={{ q }}{% endif %}"
               class="px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-white/60 hover:text-white text-sm transition-all">←
                Previous</a>
        {% endif %}
        <span class="text-white/30 text-sm px-4 py-2 bg-white/2 rounded-xl border border-white/5">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% if q %}&q={{ q }}{% endif %}"
               class="px-4 py-2 rounded-xl hover:bg-brand-accent bg-brand-primary text-white text-sm font-medium shadow-lg shadow-brand-primary/20 transition-all">Next
                →</a>
        {% endif %}
    </div>
{% endif %}
