{% extends "admin/base_admin.html" %}

{% block title %}Manage Menus{% endblock %}

{% block admin_content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">

  <nav class="flex items-center gap-2 text-xs text-white/40 mb-6" aria-label="Breadcrumb">
    <a href="{% url 'management:dashboard' %}" class="hover:text-white transition-colors">Admin Panel</a>
    <span>/</span>
    <span class="text-white/60">Menus</span>
  </nav>

  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
    <h1 class="text-2xl font-bold text-white">Manage Menus</h1>
    <a href="{% url 'management:menu_add' %}" class="px-4 py-2 rounded-xl bg-brand-primary hover:bg-blue-600 text-white text-sm font-semibold transition-colors shadow-lg shadow-brand-primary/20 whitespace-nowrap">+ Add New Menu</a>
  </div>

  <div class="rounded-2xl border border-white/8 overflow-x-auto bg-white/5 pb-2">
    <table class="w-full text-sm" {% if menus %}id="dataTable"{% endif %}>
      <thead>
        <tr class="border-b border-white/8 bg-white/3">
          <th class="px-5 py-3 text-left text-xs text-white/40 font-medium uppercase tracking-wider">Name / ID</th>
          <th class="px-5 py-3 text-right text-xs text-white/40 font-medium uppercase tracking-wider">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-white/5">
        {% for m in menus %}
        <tr class="hover:bg-white/2 transition-colors group">
          <td class="px-5 py-3">
            <div class="font-medium text-white">{{ m.name }}</div>
            <div class="text-xs text-white/40 mt-1">{{ m.slug }}</div>
          </td>
          <td class="px-5 py-3 text-right">
            <div class="flex items-center justify-end gap-2">
              <a href="{% url 'management:menu_edit' m.pk %}" class="p-2 text-brand-accent hover:bg-brand-accent/10 rounded-lg transition-colors tooltip" title="Edit">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
              </a>
              <button type="button" x-on:click.prevent="$dispatch('open-delete-modal', { url: '{% url 'management:menu_delete' m.pk %}', name: '{{ m.name|escapejs }}' })" class="p-2 text-red-400 hover:bg-red-400/10 rounded-lg transition-colors tooltip" title="Delete">
                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              </button>
            </div>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="2" class="px-5 py-8 text-center text-white/40">No menus found.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</div>
{% endblock %}
