{% extends "base.html" %}
{% load static %}

{% block title %}{{ page.title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-3xl font-bold text-white mb-6">{{ page.title }}</h1>
  <div class="prose prose-invert prose-sm max-w-none text-white/70 leading-relaxed">
    {{ page.content|safe }}
  </div>
</div>
{% endblock %}
