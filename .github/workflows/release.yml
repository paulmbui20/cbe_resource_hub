name: Release — Promote & Push to Docker Hub

# Only triggered when a semver tag is pushed, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
# Plain pushes / PRs to main are handled by ci-cd.yml — no duplication.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # v1.2.3-rc1, v1.2.3-hotfix.1

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}
  IMAGE_NAME: docker.io/paulmbui/cbe_resource_hub

jobs:
  ####################################
  #     TESTS (required gate)
  ####################################
  tests:
    name: Run Django Tests in Parallel
    uses: ./.github/workflows/_test.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION || '3.12' }}

  ####################################
  #   RELEASE — PROMOTE IMAGE
  ####################################
  release:
    name: Promote & Push Release Image
    runs-on: ubuntu-latest
    needs: [ tests ]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ── Extract the semver tag (strips the leading "v") ──────────────────
      - name: Extract version from tag
        id: version
        run: |
          RAW_TAG="${{ github.ref_name }}"           # e.g. v1.2.3
          SEMVER="${RAW_TAG#v}"                       # e.g. 1.2.3
          MAJOR="${SEMVER%%.*}"                       # e.g. 1
          MINOR="${SEMVER%.*}"; MINOR="${MINOR#*.}"   # e.g. 2
          echo "raw=${RAW_TAG}"    >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}"  >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"    >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}"    >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── QEMU + Buildx for multi-platform builds ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Pull the :edge image built by ci-cd.yml and promote it ───────────
      # Tags pushed:
      #   paulmbui/cbe_resource_hub:1.2.3   exact semver
      #   paulmbui/cbe_resource_hub:1.2      minor floating tag
      #   paulmbui/cbe_resource_hub:1        major floating tag
      #   paulmbui/cbe_resource_hub:latest   always updated on release
      - name: Pull, retag & push release image
        run: |
          docker pull ${{ env.IMAGE_NAME }}:edge

          docker tag ${{ env.IMAGE_NAME }}:edge \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}

          docker tag ${{ env.IMAGE_NAME }}:edge \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}

          docker tag ${{ env.IMAGE_NAME }}:edge \
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}

          docker tag ${{ env.IMAGE_NAME }}:edge \
            ${{ env.IMAGE_NAME }}:latest

          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # ── Summarise ─────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### 🚀 Release ${{ steps.version.outputs.raw }} published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Exact semver | \`${{ steps.version.outputs.semver }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Minor float  | \`${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Major float  | \`${{ steps.version.outputs.major }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest       | \`latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Git SHA      | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
