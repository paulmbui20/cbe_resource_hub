name: Release — Build & Push to Docker Hub

# Only triggered when a semver tag is pushed, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
# Plain pushes / PRs to main are handled by ci-cd.yml — no duplication.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"      # v1.2.3-rc1, v1.2.3-hotfix.1

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}
  IMAGE_NAME: docker.io/paulmbui/cbe_resource_hub


jobs:
  ####################################
  #     TESTS (required gate)
  ####################################
  tests:
    name: Run Django Tests in Parallel
    runs-on: ubuntu-latest
    # Only run when the tag was cut from main — prevents accidental releases from feature branches
    if: github.event.base_ref == 'refs/heads/main'

    services:
      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        run: |
          docker build \
            -f test/Dockerfile \
            --build-arg PYTHON_VERSION=${{ env.PYTHON_VERSION }} \
            -t django-test .

      - name: Run tests in parallel
        run: |
          docker run --rm \
            --network="host" \
            -e ENVIRONMENT=testing \
            -e DEBUG=False \
            -e SECRET_KEY=Uf96gCcdjM5dG0D8tFvgrGRnsRwT1UxKmyqGIM6DffZsncN16TvoGvXtHDLyh1XQ_3tCdgc1NrBL6BGv4hT5hw \
            -e ALLOWED_HOSTS=localhost,127.0.0.1 \
            -e CSRF_ORIGINS=http://localhost:8000,http://127.0.0.1:8000 \
            -e REDIS_URL=redis://localhost:6379 \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD= \
            -e EMAIL_HOST=smtp.gmail.com \
            -e EMAIL_PORT=587 \
            -e EMAIL_USE_TLS=True \
            -e EMAIL_HOST_USER=test@example.com \
            -e EMAIL_HOST_PASSWORD=test \
            -e DEFAULT_FROM_EMAIL=test@example.com \
            -e SITE_URL=http://localhost:8006 \
            -e SITE_NAME=TestSite \
            -e GOOGLE_OAUTH_CLIENT_ID=google_oauth_test_client_id \
            -e GOOGLE_OAUTH_CLIENT_SECRET=google_oauth_test_secret_key \
            -e SITE_ID=1 \
            -e ADMIN_NAME=admin \
            -e ADMIN_EMAIL=admin@gmail.com \
            -e CONTACT_EMAIL=admin@gmail.com \
            -e CONTACT_PHONE=+254712345678 \
            django-test \
            ./test/test.sh

  ####################################
  #   RELEASE — BUILD & PUSH IMAGE
  ####################################
  release:
    name: Build & Push Release Image
    runs-on: ubuntu-latest
    needs: [tests]
    # Only publish when a semver tag was pushed from main (single source of truth)
    if: github.event.base_ref == 'refs/heads/main' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read          # read repo
      packages: write         # not strictly needed for Docker Hub, but good practice


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Extract the semver tag (strips the leading "v") ───────────────────────
      - name: Extract version from tag
        id: version
        run: |
          RAW_TAG="${{ github.ref_name }}"          # e.g. v1.2.3
          SEMVER="${RAW_TAG#v}"                      # e.g. 1.2.3
          MAJOR="${SEMVER%%.*}"                      # e.g. 1
          MINOR="${SEMVER%.*}"; MINOR="${MINOR#*.}"  # e.g. 2
          echo "raw=${RAW_TAG}"   >> "$GITHUB_OUTPUT"
          echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"   >> "$GITHUB_OUTPUT"
          echo "minor=${MINOR}"   >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── QEMU + Buildx for optional multi-platform builds ──────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build and push ────────────────────────────────────────────────────────
      # Tags pushed:
      #   paulmbui/cbe_resource_hub:1.2.3          exact semver
      #   paulmbui/cbe_resource_hub:1.2             minor floating tag
      #   paulmbui/cbe_resource_hub:1               major floating tag
      #   paulmbui/cbe_resource_hub:latest           always updated on release
      - name: Build & Push release image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}
            ${{ env.IMAGE_NAME }}:latest
          # Layer cache stored per-tag on the registry — reused across releases
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          # Embed OCI metadata so the image is traceable back to the exact tag
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.semver }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Summarise ─────────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "### 🚀 Release ${{ steps.version.outputs.raw }} published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Exact semver | \`${{ steps.version.outputs.semver }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Minor float  | \`${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Major float  | \`${{ steps.version.outputs.major }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest       | \`latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image digest | \`${{ steps.docker_build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Git SHA      | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
