services:
  pg_db:
    image: postgres:17.5-alpine
    env_file:
      - ../.env.test
    environment:
      POSTGRES_DB: testdb
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - testnet

  
  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    networks:
      - testnet
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  django_tests:
    build:
      context: ..
      dockerfile: test/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    depends_on:
      pg_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env.test
    networks:
      - testnet
    command: ["./test/test.sh"]
    restart: no


networks:
  testnet:
    driver: bridge
